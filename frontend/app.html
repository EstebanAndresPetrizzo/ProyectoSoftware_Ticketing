<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicketingApp — Eventos</title>
  <meta name="application-name" content="TicketingApp" />
  <meta name="description" content="Compra entradas y elige tu butaca en tiempo real." />

  <!-- Tailwind CDN para estilos rápidos -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-slate-900 to-blue-700 text-white">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
      <h1 class="text-xl font-bold" data-app-title>🎫 TicketingApp</h1>
      <div id="user-bar" class="flex items-center gap-3 text-sm"></div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto p-4 grid lg:grid-cols-[1fr_320px] gap-6">
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
      <div id="view-catalog"></div>
      <div id="view-seats" class="hidden">
        <button id="btn-back" class="text-sm text-blue-600 hover:underline mb-3">← Volver al catálogo</button>
        <h2 id="event-title" class="text-2xl font-bold mb-1"></h2>
        <p id="event-meta" class="text-sm text-slate-500 mb-4"></p>
        <div id="stadium-map" class="overflow-x-auto py-4"></div>
      </div>
    </section>

    <aside class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 h-fit lg:sticky lg:top-4">
      <h3 class="font-semibold mb-3">Tu selección</h3>
      <ul id="selection-list" class="text-sm text-slate-600 mb-3 min-h-[40px]">
        <li class="text-slate-400">Aún no has elegido butacas.</li>
      </ul>
      <div id="countdown" class="hidden mb-3 p-2 bg-amber-50 border border-amber-200 rounded text-sm text-amber-800">
        ⏱ Reserva expira en <span id="countdown-time" class="font-mono font-bold">5:00</span>
      </div>
      <div class="flex justify-between text-sm mb-2"><span>Total:</span><strong id="total">0,00 $</strong></div>
      <button id="btn-buy"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-700 transition"
        disabled>Comprar</button>

      <div class="mt-6 pt-4 border-t border-slate-100">
        <h4 class="text-xs font-semibold text-slate-500 mb-2">LEYENDA</h4>
        <ul class="space-y-1 text-xs">
          <li><span class="legend-dot" style="background:var(--available)"></span> ✓ Disponible</li>
          <li><span class="legend-dot" style="background:var(--reserved)"></span> ⏱ Reservado</li>
          <li><span class="legend-dot" style="background:var(--purchased)"></span> 💳 Comprado</li>
          <li><span class="legend-dot" style="background:var(--sold)"></span> ✕ Vendido</li>
          <li><span class="legend-dot" style="background:var(--selected)"></span> ★ Tu selección</li>
        </ul>
      </div>
    </aside>
  </main>

  <!-- Modal de Pago -->
  <div id="payment-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-slate-900">Completar Pago</h2>
        <button id="payment-close" type="button" class="text-slate-400 hover:text-slate-600">
          <span class="text-2xl">&times;</span>
        </button>
      </div>

      <div id="payment-status" class="hidden mb-4 p-3 rounded-lg">
        <p id="payment-status-text" class="text-sm"></p>
      </div>

      <form id="payment-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Resumen</label>
          <div class="bg-slate-50 p-3 rounded-lg text-sm space-y-1">
            <div class="flex justify-between">
              <span class="text-slate-600">Reserva ID:</span>
              <span id="payment-reservation-id" class="font-mono text-slate-900"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-600">Monto:</span>
              <span id="payment-amount" class="font-bold text-slate-900"></span>
            </div>
          </div>
        </div>

        <div>
          <label for="payment-method" class="block text-sm font-medium text-slate-700 mb-1">Método de Pago</label>
          <select id="payment-method" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" required>
            <option value="">Selecciona un método...</option>
            <option value="Card">Tarjeta de Crédito/Débito</option>
            <option value="Mock">Simulación (Prueba)</option>
          </select>
        </div>

        <div id="card-fields">
          <div>
            <label for="cardholder-name" class="block text-sm font-medium text-slate-700 mb-1">Titular</label>
            <input type="text" id="cardholder-name" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" placeholder="Juan Pérez">
          </div>

          <div class="mt-3">
            <label for="card-number" class="block text-sm font-medium text-slate-700 mb-1">Número de Tarjeta</label>
            <input type="text" id="card-number" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" placeholder="4532 1234 5678 9010" maxlength="19">
          </div>

          <div class="grid grid-cols-2 gap-3 mt-3">
            <div>
              <label for="expiry-month" class="block text-sm font-medium text-slate-700 mb-1">Mes</label>
              <input type="text" id="expiry-month" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" placeholder="MM" maxlength="2">
            </div>
            <div>
              <label for="expiry-year" class="block text-sm font-medium text-slate-700 mb-1">Año</label>
              <input type="text" id="expiry-year" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" placeholder="YY" maxlength="2">
            </div>
          </div>

          <div class="mt-3">
            <label for="cvv" class="block text-sm font-medium text-slate-700 mb-1">CVV</label>
            <input type="text" id="cvv" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" placeholder="123" maxlength="4">
          </div>
        </div>

        <p class="text-xs text-slate-500 bg-blue-50 p-2 rounded">💡 Para prueba, usa: 4532123456789010 (éxito) o 4000000000000002 (fallo)</p>

        <div class="flex gap-3 pt-4">
          <button type="button" id="payment-cancel" class="flex-1 px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">Cancelar</button>
          <button type="submit" id="payment-submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Pagar</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="py-4 text-center text-sm text-slate-500 border-t border-slate-200">
    <p id="app-footer-contact" class="px-4"></p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>

</html>
