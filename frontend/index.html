<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ticketing App</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-gray-900 text-white p-4 shadow">
    <h1 class="text-xl font-bold">🎟️ Ticketing Platform</h1>
  </header>

  <!-- Main -->
  <main class="p-6">

    <!-- Vista catálogo -->
    <section id="events-view">
      <h2 class="text-lg font-semibold mb-4">Eventos</h2>

      <div id="events-container" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
        <!-- Eventos se renderizan acá -->
      </div>
    </section>

    <!-- Vista asientos -->
    <section id="seats-view" class="hidden">
      <h2 class="text-lg font-semibold mb-4">Mapa de Asientos</h2>

      <button 
        id="back-button"
        class="mb-4 bg-gray-700 text-white px-3 py-1 rounded"
      >
        ← Volver
      </button>

      <div id="seats-container" class="grid grid-cols-10 gap-2">
      </div>
    </section>

  </main>

  <!-- JS -->
  <script type="module" src="/frontend/js/main.js"></script>

</body>
</html>
