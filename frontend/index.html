<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicketingApp — Iniciar sesión</title>
  <meta name="application-name" content="TicketingApp" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-slate-900 to-blue-700 text-white py-6">
    <div class="max-w-lg mx-auto px-4 text-center">
      <h1 class="text-2xl font-bold" data-app-title>🎫 TicketingApp</h1>
      <p class="text-slate-200 text-sm mt-1">Entra con Google o, en entorno de prueba Docker, con el modo sin Google.</p>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
      <h2 class="text-lg font-semibold text-slate-800 mb-2">Iniciar sesión</h2>
      <p id="login-google-hint" class="text-sm text-slate-500 mb-6">Con Google no guardamos contraseñas en esta app.</p>
      <div id="google-signin" class="flex justify-center"></div>
      <div id="dev-login-wrap" class="hidden mt-2"></div>
      <p id="login-status" class="hidden mt-4 text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-lg p-3"></p>
    </div>
  </main>

  <footer class="mt-auto py-6 text-center text-sm text-slate-500">
    <p id="app-footer-contact" class="px-4"></p>
  </footer>

  <script type="module" src="js/login.js"></script>
</body>

</html>
