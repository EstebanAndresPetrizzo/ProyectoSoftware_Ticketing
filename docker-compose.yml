services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing_user
      POSTGRES_PASSWORD: ticketing_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend/TicketingAPI
    container_name: ticketing-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=ticketing;Username=ticketing_user;Password=ticketing_pass
      ASPNETCORE_ENVIRONMENT: Development
      # Login de prueba sin Google (botón en la pantalla de login). Desactiva en producción.
      Ticketing__EnableDockerDevLogin: "true"
      # Opcional: Client ID OAuth de Google. Copia desde .env (ver .env.example).
      Authentication__Google__ClientId: 1046346495617-n4eheruoh5e8cl43krcqquqg8sm0kc4l.apps.googleusercontent.com
      App__Name: "TicketingApp"
      App__ContactEmail: "petrizzoesteban@gmail.com"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ticketing-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
