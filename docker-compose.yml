services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend/TicketingAPI
    container_name: ticketing-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Development
      # Login de prueba sin Google (botón en la pantalla de login). Desactiva en producción.
      Ticketing__EnableDockerDevLogin: "true"
      # Opcional: Client ID OAuth de Google. Copia desde .env (ver .env).
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      App__Name: "TicketingApp"
      App__ContactEmail: "petrizzoesteban@gmail.com"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ticketing-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
